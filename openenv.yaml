name: email-triage-env
description: Email classification RL environment

version: 1.0

environment:
  entry_point: env:EmailEnv

tasks:
  - name: easy
    env_kwargs:
      difficulty: easy
    grader:
      type: python
      entry_point: env:grade

  - name: medium
    env_kwargs:
      difficulty: medium
    grader:
      type: python
      entry_point: env:grade

  - name: hard
    env_kwargs:
      difficulty: hard
    grader:
      type: python
      entry_point: env:grade

api:
  reset: true
  step: true
  state: true
