name: email-triage-env
description: Email classification RL environment

version: 1.0

environment:
  entry_point: env:EmailEnv

tasks:
  - name: easy
    grader:
      type: score
      entry_point: env:EmailEnv.get_score

  - name: medium
    grader:
      type: score
      entry_point: env:EmailEnv.get_score

  - name: hard
    grader:
      type: score
      entry_point: env:EmailEnv.get_score

api:
  reset: true
  step: true
  state: true
